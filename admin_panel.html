<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Autocredit — Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --card: #1c1c1c; --gold: #c9a84c; --gold-light: #e8c97a;
    --text: #f0f0f0; --muted: #888; --border: #333; --danger: #e74c3c; --success: #2ecc71;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; font-size: 14px; padding-bottom: 40px; }
  .header { background: var(--card); padding: 14px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header-title { font-size: 17px; font-weight: 700; color: var(--gold); }
  .tabs { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 14px; border-radius: 8px; background: #262626; color: var(--muted); font-size: 13px; white-space: nowrap; cursor: pointer; }
  .tab.active { background: var(--gold); color: #000; font-weight: 600; }
  .content { padding: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .input-field { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; padding: 11px 12px; outline: none; margin-bottom: 8px; }
  .input-field:focus { border-color: var(--gold); }
  .btn { width: 100%; background: var(--gold); color: #000; font-weight: 700; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .btn.secondary { background: none; border: 1.5px solid var(--gold); color: var(--gold); }
  .btn.small { width: auto; padding: 7px 12px; font-size: 12px; }
  .btn.danger { background: var(--danger); color: white; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .card-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
  .card-row:last-child { border-bottom: none; }
  .card-row .label { color: var(--muted); }
  .badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge.pending { background: #3a2f00; color: var(--gold-light); }
  .badge.paid, .badge.awarded { background: #0f3a1e; color: var(--success); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .prize-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .prize-row input[type=text] { flex: 2; }
  .prize-row input[type=number] { flex: 1; }
</style>
</head>
<body>

<div class="header"><div class="header-title">🛠 MS AUTOCREDIT — Admin panel</div></div>

<div class="tabs">
  <div class="tab active" data-tab="search" onclick="switchTab('search')">🔍 Qidiruv</div>
  <div class="tab" data-tab="orders" onclick="switchTab('orders')">📦 Buyurtmalar</div>
  <div class="tab" data-tab="customers" onclick="switchTab('customers')">👥 Mijozlar</div>
  <div class="tab" data-tab="prizes" onclick="switchTab('prizes')">🎡 Baraban</div>
  <div class="tab" data-tab="stats" onclick="switchTab('stats')">📊 Statistika</div>
</div>

<div class="content">

  <!-- QIDIRUV -->
  <div class="panel active" id="panel-search">
    <input class="input-field" id="searchCode" placeholder="Mijoz kodini kiriting (masalan: 482913)">
    <button class="btn" onclick="searchCustomer()">Qidirish</button>
    <div id="searchResult" style="margin-top:14px"></div>
  </div>

  <!-- BUYURTMALAR -->
  <div class="panel" id="panel-orders">
    <button class="btn secondary" onclick="loadOrders()" style="margin-bottom:10px">🔄 Yangilash</button>
    <div id="ordersList"></div>
  </div>

  <!-- MIJOZLAR RO'YXATI -->
  <div class="panel" id="panel-customers">
    <button class="btn secondary" onclick="loadCustomers()" style="margin-bottom:10px">🔄 Yangilash</button>
    <div id="customersList"></div>
  </div>

  <!-- BARABAN SOZLAMALARI -->
  <div class="panel" id="panel-prizes">
    <div id="prizesForm"></div>
    <button class="btn" onclick="savePrizes()" style="margin-top:10px">💾 Saqlash</button>
  </div>

  <!-- STATISTIKA -->
  <div class="panel" id="panel-stats">
    <button class="btn secondary" onclick="loadStats()" style="margin-bottom:10px">🔄 Yangilash</button>
    <div id="statsContent"></div>
  </div>

</div>

<script>
// ⚠️ MUHIM: Bot joylashgan Render manzilini shu yerga yozing (oxirida / bo'lmasin)
const API_BASE = "https://SIZNING-MIJOZLAR-BOTI-MANZILI.onrender.com";

const tg = window.Telegram ? window.Telegram.WebApp : null;
const adminId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

try { tg.ready(); tg.expand(); tg.setHeaderColor('#0f0f0f'); } catch(e) {}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'orders') loadOrders();
  if (name === 'customers') loadCustomers();
  if (name === 'prizes') loadPrizes();
  if (name === 'stats') loadStats();
}

function fmt(n) { return Math.round(n).toLocaleString('uz-UZ') + " so'm"; }

async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, admin_id: adminId }),
  });
  return res.json();
}

async function apiGet(path) {
  const res = await fetch(API_BASE + path + (path.includes('?') ? '&' : '?') + 'admin_id=' + adminId);
  return res.json();
}

// ============ QIDIRUV ============
async function searchCustomer() {
  const code = document.getElementById('searchCode').value.trim();
  if (!code) return;
  const el = document.getElementById('searchResult');
  el.innerHTML = 'Qidirilmoqda...';

  const data = await apiPost('/api/admin/search-customer', { code });
  if (!data.ok) { el.innerHTML = `<div class="card">❌ ${data.error}</div>`; return; }

  const c = data.customer;
  let html = `
    <div class="card">
      <div class="card-row"><span class="label">Ism</span><span>${c.full_name || '-'}</span></div>
      <div class="card-row"><span class="label">Telefon</span><span>${c.phone || '-'}</span></div>
      <div class="card-row"><span class="label">Kod</span><span><b>${c.code}</b></span></div>
      <div class="card-row"><span class="label">Taklif qilgan</span><span>${c.referred_by_code || '—'}</span></div>
      <div class="card-row"><span class="label">Aylantirish huquqi</span><span>${c.spin_available ? '✅ Bor' : "❌ Yo'q"}</span></div>
    </div>
    <div style="font-weight:600;margin:10px 0 6px">🎁 Yutuqlar</div>`;

  if (data.spins.length === 0) html += `<div class="card">Yutuq yo'q</div>`;
  data.spins.forEach(s => {
    html += `<div class="card">
      <div class="card-row">
        <span>${s.prize_name}</span>
        <span class="badge ${s.awarded ? 'awarded' : 'pending'}">${s.awarded ? '✅ Topshirildi' : '⏳ Kutilmoqda'}</span>
      </div>
      ${!s.awarded ? `<button class="btn small" style="margin-top:8px" onclick="confirmPrize(${s.id})">✅ Sovg'a topshirildi</button>` : ''}
    </div>`;
  });

  html += `<div style="font-weight:600;margin:14px 0 6px">👥 Taklif qilganlari</div>`;
  if (data.referrals_given.length === 0) html += `<div class="card">Hech kimni taklif qilmagan</div>`;
  data.referrals_given.forEach(r => {
    html += `<div class="card">
      <div class="card-row">
        <span>${r.referred_code} — ${fmt(r.amount)}</span>
        <span class="badge ${r.status}">${r.status === 'paid' ? "✅ To'landi" : '⏳ Kutilmoqda'}</span>
      </div>
      ${r.status !== 'paid' ? `<button class="btn small" style="margin-top:8px" onclick="confirmReferral(${r.id})">💰 To'landi deb belgilash</button>` : ''}
    </div>`;
  });

  el.innerHTML = html;
}

async function confirmPrize(spinId) {
  if (!confirm("Sovg'a mijozga topshirildimi? Bu keyingi aylantirish huquqini ochadi.")) return;
  const data = await apiPost('/api/admin/confirm-prize', { spin_id: spinId });
  if (data.ok) { alert('Tasdiqlandi!'); searchCustomer(); }
  else alert('Xatolik: ' + data.error);
}

async function confirmReferral(refId) {
  if (!confirm("Referal puli to'langanini tasdiqlaysizmi?")) return;
  const data = await apiPost('/api/admin/confirm-referral', { referral_id: refId });
  if (data.ok) { alert('Tasdiqlandi!'); searchCustomer(); }
  else alert('Xatolik: ' + data.error);
}

// ============ MIJOZLAR RO'YXATI ============
// ============ BUYURTMALAR ============
const ORDER_STATUS_LABELS = {
  pending: { text: '🆕 Yangi', cls: 'pending' },
  answered: { text: '💬 Javob berilgan', cls: 'pending' },
  confirmed: { text: '✅ Tasdiqlangan', cls: 'awarded' },
};

async function loadOrders() {
  const el = document.getElementById('ordersList');
  el.innerHTML = 'Yuklanmoqda...';
  const data = await apiGet('/api/admin/orders');
  if (!data.ok) { el.innerHTML = `❌ ${data.error}`; return; }

  if (data.orders.length === 0) { el.innerHTML = '<div class="card">Buyurtmalar yo\'q</div>'; return; }

  let html = '';
  data.orders.forEach(o => {
    const st = ORDER_STATUS_LABELS[o.status] || { text: o.status, cls: 'pending' };
    html += `<div class="card">
      <div class="card-row"><span class="label">${o.customer_name}</span><span class="badge ${st.cls}">${st.text}</span></div>
      <div class="card-row"><span class="label">Tel / Kod</span><span>${o.customer_phone} / ${o.customer_code}</span></div>
      <div style="white-space:pre-wrap;font-size:13px;margin:8px 0;padding:8px;background:#0a0a0a;border-radius:6px">${o.details}</div>`;

    if (o.admin_reply) {
      html += `<div style="font-size:12px;color:#888;margin-bottom:8px">💬 Javob: ${o.admin_reply}</div>`;
    }

    if (o.status === 'pending' || o.status === 'answered') {
      html += `<textarea id="reply-${o.id}" class="input-field" rows="2" placeholder="Javobingizni yozing..."></textarea>
        <button class="btn small" style="margin-top:6px" onclick="replyOrder(${o.id})">📩 Javob yuborish</button>`;
    }
    if (o.status !== 'confirmed') {
      html += `<button class="btn small" style="margin-top:6px;margin-left:6px" onclick="confirmOrder(${o.id})">✅ Xarid tasdiqlandi</button>`;
    }

    html += `</div>`;
  });
  el.innerHTML = html;
}

async function replyOrder(orderId) {
  const text = document.getElementById(`reply-${orderId}`).value.trim();
  if (!text) { alert("Javob matnini kiriting."); return; }
  const data = await apiPost('/api/admin/order-reply', { order_id: orderId, reply_text: text });
  if (data.ok) { alert("Javob yuborildi!"); loadOrders(); }
  else alert("Xatolik: " + data.error);
}

async function confirmOrder(orderId) {
  if (!confirm("Xarid tasdiqlansinmi? Bu mijozga keyingi sovg'a huquqini ochadi va referal pulini to'langan deb belgilaydi.")) return;
  const data = await apiPost('/api/admin/order-confirm', { order_id: orderId });
  if (data.ok) { alert("Tasdiqlandi!"); loadOrders(); }
  else alert("Xatolik: " + data.error);
}


async function loadCustomers() {
  const el = document.getElementById('customersList');
  el.innerHTML = 'Yuklanmoqda...';
  const data = await apiGet('/api/admin/customers');
  if (!data.ok) { el.innerHTML = `❌ ${data.error}`; return; }

  let html = '';
  data.customers.forEach(c => {
    html += `<div class="card">
      <div class="card-row"><span class="label">${c.full_name || '-'}</span><span><b>${c.code}</b></span></div>
      <div class="card-row"><span class="label">Tel</span><span>${c.phone || '-'}</span></div>
    </div>`;
  });
  el.innerHTML = html || 'Mijozlar yo\'q';
}

// ============ BARABAN SOZLAMALARI ============
async function loadPrizes() {
  const el = document.getElementById('prizesForm');
  el.innerHTML = 'Yuklanmoqda...';
  const data = await apiGet('/api/admin/prizes');
  if (!data.ok) { el.innerHTML = `❌ ${data.error}`; return; }

  let html = '';
  data.prizes.forEach(p => {
    html += `<div class="prize-row" data-id="${p.id}">
      <input type="text" class="input-field pname" value="${p.name}">
      <input type="number" class="input-field ppct" value="${p.probability}" step="0.1">
    </div>`;
  });
  html += `<div style="font-size:12px;color:#888;margin-top:6px">Foizlar yig'indisi 100% bo'lishi tavsiya etiladi</div>`;
  el.innerHTML = html;
}

async function savePrizes() {
  const rows = document.querySelectorAll('#prizesForm .prize-row');
  const prizes = [];
  rows.forEach(row => {
    prizes.push({
      id: row.dataset.id,
      name: row.querySelector('.pname').value,
      probability: row.querySelector('.ppct').value,
      active: 1,
    });
  });
  const data = await apiPost('/api/admin/prizes', { prizes });
  if (data.ok) alert('Saqlandi!'); else alert('Xatolik: ' + data.error);
}

// ============ STATISTIKA ============
async function loadStats() {
  const el = document.getElementById('statsContent');
  el.innerHTML = 'Yuklanmoqda...';
  const data = await apiGet('/api/admin/stats');
  if (!data.ok) { el.innerHTML = `❌ ${data.error}`; return; }

  let html = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${data.total_customers}</div><div class="stat-label">Jami mijozlar</div></div>
    <div class="stat-card"><div class="stat-num">${data.total_spins}</div><div class="stat-label">Jami aylantirishlar</div></div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${fmt(data.referral_pending_sum)}</div><div class="stat-label">Referal — kutilmoqda (${data.referral_pending_count})</div></div>
    <div class="stat-card"><div class="stat-num">${fmt(data.referral_paid_sum)}</div><div class="stat-label">Referal — to'landi (${data.referral_paid_count})</div></div>
  </div>
  <div style="font-weight:600;margin:14px 0 6px">🎁 Sovg'alar taqsimoti</div>`;

  data.prize_breakdown.forEach(p => {
    html += `<div class="card">
      <div class="card-row"><span>${p.prize_name}</span><span>${p.c} marta (${p.awarded_c || 0} topshirilgan)</span></div>
    </div>`;
  });

  el.innerHTML = html;
}

if (!adminId) {
  document.body.innerHTML = '<div style="padding:20px;text-align:center;color:#e74c3c">Bu panel faqat Telegram bot ichida ochiladi.</div>';
}
</script>
</body>
</html>
